snapshots:
    - name: item_dimension  # this  will be scd-type-2 table name in catalog
      relation: ref('source_gold_items')
      config:
        schema: gold
        database: dbt
        unique_key: id
        strategy: timestamp
        updated_at: update_date
        dbt_valid_to_current: "to_date('9999-12-31')"